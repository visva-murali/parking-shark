# Google App Engine - Standard environment (Node.js 20)
# Deploy with: gcloud app deploy deploy/app.yaml

runtime: nodejs20
env: standard
instance_class: F1

automatic_scaling:
  max_instances: 2
  min_instances: 0

env_variables:
  NODE_ENV: "production"
  DB_USER: "ps_app"
  DB_NAME: "parking_shark"
  # DB_PASS and SESSION_SECRET MUST be set via Secret Manager or
  # `gcloud app deploy --set-env-vars` rather than checked into git.
  # CLOUD_SQL_CONNECTION_NAME format: PROJECT_ID:REGION:INSTANCE_NAME
  CLOUD_SQL_CONNECTION_NAME: "REPLACE_PROJECT:REGION:ps-mysql"

beta_settings:
  cloud_sql_instances: "REPLACE_PROJECT:REGION:ps-mysql"

handlers:
  - url: /.*
    script: auto
    secure: always
